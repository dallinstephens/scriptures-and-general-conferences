<!-- Reference for bootstap 3 panels: https://www.w3schools.com/bootstrap/bootstrap_panels.asp -->
<div class="panel panel-default">
    <div class="panel-heading">
        <div class="row">
            <div class="col-xs-12">
                <!-- Reference for bootstrap buttons: https://www.w3schools.com/bootstrap/bootstrap_buttons.asp -->
                <a class="btn btn-default back-button" [routerLink]="['/books']">Back</a>
                <!-- button styles: https://www.w3schools.com/bootstrap/bootstrap_buttons.asp -->
                <a class="btn btn-warning edit-button" (click)="toggleEdit()">{{ editMode ? 'Done' : 'Edit' }}</a> 
                <!-- <a class="btn btn-warning edit-button" [routerLink]="['/books', book.id, 'edit']">Edit</a> -->
                <!-- <a class="btn btn-danger delete-button" (click)="onDelete()">Delete</a> -->
                <a class="btn btn-primary full-screen-button pull-right pad-left-right" (click)="onView(); $event.stopPropagation()">Full Screen</a>
            </div>
        </div>
        <div class="row">
            <div class="col-xs-12" style="font-size: 20px; padding-top: 10px;">
                <b>{{ book.bookName }}</b>
            </div>
        </div>
        <div class="row" style="align-items: center; margin: 10px 0 0 0">
            <div class="col-sm-7" style="padding-left: 0; padding-right: 0">
                <div class="book-frame-container">
                    <!-- Reference for iframe: https://www.w3schools.com/tags/tag_iframe.ASP -->
                    <iframe 
                        class="book-frame" 
                        [src]="safeUrl">
                    </iframe>
                </div>
            </div>
            <div class="col-sm-5" style="padding-left: 15px; padding-right: 0">       
                <img *ngIf="book.bookImageLink" src="{{ book.bookImageLink }}"
                alt="{{ book.bookPassage }}"
                class="book-image img-responsive">
            </div>
        </div>
        <div class="row">
            <div class="col-md-12" style=" font-size: 20px;">
                <b>Keywords: </b>
                <span>{{ book.keywords.join(', ') }}</span>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <div class="row">
            <div class="col-xs-12" *ngIf="editMode">
                <app-book-form 
                    [showKeywordsAndNotesBlockOnly]="true"
                    (keywordsAndNotesSaved)="saveKeywordsAndNotes($event)">
                </app-book-form>
            </div>
            <div *ngIf="!editMode">
                <div class="col-xs-12" *ngFor="let q of book.questionsOrTopics; let i = index">
                    <p><strong><u>Question/Topic</u>:</strong> {{ q }}</p>
                    <p><strong><u>Note</u>:</strong> {{ book.notes[i] }}</p>
                    <hr>
                </div>
            </div>
        </div>
    </div>
</div>
