<!-- Reference for bootstap 3 panels: https://www.w3schools.com/bootstrap/bootstrap_panels.asp -->
<div class="panel panel-default" *ngIf="generalconference">
    <div class="panel-heading">
        <div class="row">
            <div class="col-xs-12">
                <!-- Reference for bootstrap buttons: https://www.w3schools.com/bootstrap/bootstrap_buttons.asp -->
                <a class="btn btn-default back-button" [routerLink]="['/general-conferences']">Back</a>
                <!-- button styles: https://www.w3schools.com/bootstrap/bootstrap_buttons.asp -->
                <a class="btn btn-warning edit-button" (click)="toggleEdit()">{{ editMode ? 'Done' : 'Edit' }}</a>
                <!-- <a class="btn btn-warning edit-button" [routerLink]="['/general-conferences', generalconference.id, 'edit']">Edit</a> -->
                <a class="btn btn-danger delete-button" (click)="onDelete()">Delete</a>
                <a class="btn btn-primary full-screen-button pull-right pad-left-right" (click)="onView(); $event.stopPropagation()">Read Full Screen</a>
            </div>
        </div>
        <div class="row">
            <div class="col-xs-12" style="font-size: 20px; padding-top: 10px;">
                <b>{{ generalconference.generalconferenceSpeaker }}, {{ generalconference.generalconferenceMonthYear }}</b>
            </div>
        </div>
        <div class="row" style="align-items: center; margin: 10px 0 0 0">
            <div class="col-sm-7" style="padding-left: 0; padding-right: 0">
                <div class="generalconference-frame-container">
                    <!-- Reference for iframe: https://www.w3schools.com/tags/tag_iframe.ASP -->
                    <iframe 
                        class="generalconference-frame" 
                        [src]="safeUrl">
                    </iframe>
                </div>
            </div>
            <div 
                class="col-sm-4" 
                style="padding-left: 15px; padding-right: 0"
                *ngIf="!generalconference.generalconferenceYoutubeLink && generalconference.generalconferenceSpeakerImageLink">       
                <img *ngIf="generalconference.generalconferenceSpeakerImageLink" src="{{ generalconference.generalconferenceSpeakerImageLink }}"
                alt="{{ generalconference.generalconferencePassage }}"
                class="generalconference-image img-responsive">
            </div>
            <div 
                class="col-sm-5" 
                style="padding-left: 15px; padding-right: 0"
                *ngIf="generalconference.generalconferenceYoutubeLink">
                <iframe 
                    [class]="isFullScreen ? 'youtube-fullscreen-iframe' : 'youtube-not-fullscreen-iframe'" 
                    [src]="safeYoutubeUrl" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>
                <div 
                    *ngIf="isFullScreen"
                    style="position: fixed; top: 10px; right: 10px; z-index: 10000">
                    <button class="btn btn-danger" (click)="exitFullScreen()">Exit</button>
                </div>
                <div>
                    <input 
                        type="checkbox" 
                        id="autoplay"
                        [(ngModel)]="autoplay"
                        (change)="updateAutoplay()">
                    <label for="autoplay" style="margin-left: 5px; margin-right: 5px">Autoplay</label>
                    <input 
                        type="checkbox" 
                        id="loadFullScreen"
                        [(ngModel)]="loadFullScreen"
                        (change)="loadFullscreen()">
                    <label for="autoplay" style="margin-left: 5px">Load Full Screen</label>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12" style=" font-size: 20px;">
                <b>Keywords: </b>
                <span>{{ generalconference.keywords.join(', ') }}</span>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <div class="row">
            <div class="col-xs-12" *ngIf="editMode">
                <app-generalconference-form 
                    [showKeywordsAndNotesBlockOnly]="true"
                    (keywordsAndNotesSaved)="toggleEdit()">
                </app-generalconference-form>
            </div>
            <div *ngIf="!editMode">
                <div class="col-xs-12" *ngFor="let q of generalconference.questionsOrTopics; let i = index">
                    <p><strong><u>Question/Topic</u>:</strong> {{ q }}</p>
                    <p><strong><u>Note</u>:</strong> {{ generalconference.notes[i] }}</p>
                    <hr>
                </div>
            </div>
        </div>
    </div>
</div>
