<!-- Reference for bootstap 3 panels: https://www.w3schools.com/bootstrap/bootstrap_panels.asp -->
<div class="panel panel-default" *ngIf="video">
    <div class="panel-heading">
        <div class="row">
            <div class="col-xs-12">
                <!-- Reference for bootstrap buttons: https://www.w3schools.com/bootstrap/bootstrap_buttons.asp -->
                <a class="btn btn-default back-button" [routerLink]="['/videos']">Back</a>
                <!-- button styles: https://www.w3schools.com/bootstrap/bootstrap_buttons.asp -->
                <a class="btn btn-warning edit-button" (click)="toggleEdit()">{{ editMode ? 'Done' : 'Edit' }}</a>
                <!-- <a class="btn btn-warning edit-button" [routerLink]="['/videos', video.id, 'edit']">Edit</a> -->
                <!-- <a class="btn btn-danger delete-button" (click)="onDelete()">Delete</a> -->
            </div>
        </div>
        <div class="row">
            <div class="col-xs-12" style="font-size: 20px; padding-top: 10px;">
                <b>{{ video.videoSpeaker }}</b>
            </div>
        </div>
        <div class="row" style="align-items: center; margin: 10px 0 0 0">
            <div 
                class="col-sm-6" 
                style="margin: 0; padding: 0; background-color: #e7e7e7; height: 300px; width: auto"
                *ngIf="video.videoImageLink">       
                <img *ngIf="video.videoImageLink" src="{{ video.videoImageLink }}"
                alt="{{ video.videoTitle }}"
                class="video-image img-responsive"
                style="height: 300px;">
            </div>
            <div 
                class="col-sm-6" 
                style="padding-left: 45px; padding-right: 0"
                *ngIf="video.videoYoutubeLink">
                <iframe 
                    [class]="isFullScreen ? 'youtube-fullscreen-iframe' : 'youtube-not-fullscreen-iframe'" 
                    [src]="safeYoutubeUrl" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>
                <div 
                    *ngIf="isFullScreen"
                    style="position: fixed; top: 10px; right: 10px; z-index: 10000">
                    <button class="btn btn-danger" (click)="exitFullScreen()">Exit</button>
                </div>
                <div>
                    <input 
                        type="checkbox" 
                        id="autoplay"
                        [(ngModel)]="autoplay"
                        (change)="updateAutoplay()">
                    <label for="autoplay" style="margin-left: 5px; margin-right: 5px">Autoplay</label>
                    <input 
                        type="checkbox" 
                        id="loadFullScreen"
                        [(ngModel)]="loadFullScreen"
                        (change)="loadFullscreen()">
                    <label for="autoplay" style="margin-left: 5px">Load Full Screen</label>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12" style=" font-size: 20px;">
                <b>Keywords: </b>
                <span>{{ video.keywords.join(', ') }}</span>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <div class="row">
            <div class="col-xs-12" *ngIf="editMode">
                <app-video-form 
                    [showKeywordsAndNotesBlockOnly]="true"
                    (keywordsAndNotesSaved)="toggleEdit()">
                </app-video-form>
            </div>
            <div *ngIf="!editMode">
                <div class="col-xs-12" *ngFor="let q of video.questionsOrTopics; let i = index">
                    <p><strong><u>Question/Topic</u>:</strong> {{ q }}</p>
                    <p><strong><u>Note</u>:</strong> {{ video.notes[i] }}</p>
                    <hr>
                </div>
            </div>
        </div>
    </div>
</div>
